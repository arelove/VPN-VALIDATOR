version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-logs-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: vpn_logs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: